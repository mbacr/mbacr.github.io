<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dentech - Procedure Records</title>
  <script>
    if (!localStorage.getItem("user")) {
      window.location.replace("login.html");
    }
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<div class="d-flex">
  <nav id="sidebar" class="bg-dark text-white vh-100 position-fixed">
    <div class="sidebar-header p-3 border-bottom border-secondary">
      <h4><i class="bi bi-hospital"></i> Dentech</h4>
      <small class="text-secondary">Dental Clinic System</small>
    </div>
    <ul class="nav flex-column p-2">
      <li class="nav-item"><a class="nav-link text-white" href="index.html"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="patients.html"><i class="bi bi-people me-2"></i> Patients</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="dentists.html"><i class="bi bi-person-badge me-2"></i> Dentists</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="staff.html"><i class="bi bi-person-gear me-2"></i> Staff</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="appointments.html"><i class="bi bi-calendar-check me-2"></i> Appointments</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="treatments.html"><i class="bi bi-clipboard2-pulse me-2"></i> Treatments</a></li>
      <li class="nav-item"><a class="nav-link text-white active" href="procedures.html"><i class="bi bi-journal-medical me-2"></i> Procedure Records</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="prescriptions.html"><i class="bi bi-capsule me-2"></i> Prescriptions</a></li>
    </ul>
  </nav>

  <main class="main-content">
    <nav class="navbar navbar-light bg-white border-bottom px-4 sticky-top">
      <span class="navbar-brand mb-0 h5">Procedure Records</span>
      <div class="d-flex align-items-center gap-3">
        <i class="bi bi-bell fs-5"></i>
        <div class="d-flex align-items-center gap-2">
          <i class="bi bi-person-circle fs-4"></i>
          <span id="userEmail"></span>
        </div>
        <button id="btnLogout" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </nav>

    <div class="container-fluid p-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5>Procedure Records</h5>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalProcedure">
          <i class="bi bi-plus-lg me-1"></i> New Record
        </button>
      </div>
      <div class="card">
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-light">
              <tr><th>ID</th><th>Date</th><th>Patient</th><th>Dentist</th><th>Treatment</th><th>Price</th><th>Notes</th><th>Actions</th></tr>
            </thead>
            <tbody id="tbodyProcedures"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Procedure Record Modal -->
<div class="modal fade" id="modalProcedure" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalProcedureTitle">New Procedure Record</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form>
          <input type="hidden" id="txtProcedureId">
          <div class="row g-3">
            <div class="col-6"><label class="form-label">Appointment</label>
              <select class="form-select" id="selAppointment"></select>
            </div>
            <div class="col-6"><label class="form-label">Treatment</label>
              <select class="form-select" id="selTreatment"></select>
            </div>
            <div class="col-6"><label class="form-label">Dentist</label>
              <select class="form-select" id="selDentist"></select>
            </div>
            <div class="col-6"><label class="form-label">Date Performed</label><input type="date" class="form-control" id="txtDatePerformed"></div>
            <div class="col-6"><label class="form-label">Price ($)</label><input type="number" class="form-control" id="txtPrice" step="0.01" placeholder="0.00"></div>
            <div class="col-12"><label class="form-label">Clinical Notes</label><textarea class="form-control" id="txtNotes" rows="3"></textarea></div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="btnSaveProcedure">Save Record</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="./procedures.js" type="module"></script>
<script src="./auth.js"></script>
</body>
</html>
